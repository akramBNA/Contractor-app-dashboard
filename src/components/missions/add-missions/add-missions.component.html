<h2 mat-dialog-title class="text-xl md:text-2xl font-semibold text-gray-800 text-center">Ajouter une Mission</h2>

<mat-dialog-content class="p-4 md:p-6 max-h-[75vh] overflow-y-auto">

  <app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

  <form [formGroup]="missionForm" class="space-y-6">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Nom de la Mission</mat-label>
        <input matInput formControlName="mission_name" />
      </mat-form-field>

      <mat-form-field class="w-full" appearance="fill">
        <mat-label>Assigné à</mat-label>

        <mat-chip-grid #chipGrid aria-label="Sélection d'employés">
          <mat-chip-row *ngFor="let emp of selectedEmployees" (removed)="removeEmployee(emp)" color="primary" selected>
            {{ emp.employee_name }} {{ emp.employee_lastname }}
            <button matChipRemove>
              <mat-icon>cancel</mat-icon>
            </button>
          </mat-chip-row>
        </mat-chip-grid>

        <input placeholder="Rechercher un employé..." [matAutocomplete]="auto" [matChipInputFor]="chipGrid"
          [matChipInputSeparatorKeyCodes]="separatorKeysCodes" [formControl]="employeeCtrl"
          (matChipInputTokenEnd)="addEmployeeFromInput($event)" />

        <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selected($event)">
          <mat-option *ngFor="let emp of filteredEmployees" [value]="emp">
            {{ emp.employee_name }} {{ emp.employee_lastname }}
          </mat-option>
        </mat-autocomplete>
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Date de Début</mat-label>
        <input matInput [matDatepicker]="startPicker" formControlName="start_at" [matDatepickerFilter]="dateFilter" />
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Date de Fin</mat-label>
        <input matInput [matDatepicker]="endPicker" formControlName="end_at" [matDatepickerFilter]="dateFilter" />
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Frais</mat-label>
        <input matInput type="number" formControlName="expenses" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Priorité</mat-label>
        <mat-select formControlName="priority">
          <mat-option value="">-- Sélectionner --</mat-option>
          <mat-option value="LOW">Faible</mat-option>
          <mat-option value="MEDIUM">Moyenne</mat-option>
          <mat-option value="HIGH">Élevée</mat-option>
        </mat-select>
      </mat-form-field>

    </div>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="mission_description" rows="5"></textarea>
    </mat-form-field>

  </form>
</mat-dialog-content>

<div class="flex flex-col sm:flex-row justify-center gap-4 pt-4 sm:pt-6 mb-4">
  <button class="btn-cancel" type="button" (click)="cancel()">Annuler</button>
  <button class="btn-add" type="button" (click)="onSubmitMission()">Ajouter</button>
</div>
